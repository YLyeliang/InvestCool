{% extends "base.html" %}

{% block title %}{{ post.title }} — {{ config.SITE_NAME }}{% endblock %}

{% block content %}
<article class="post-detail">
    <header class="post-header">
        <h1>{{ post.title }}</h1>
        <div class="post-meta">
            <time>{{ post.date_str }}</time>
            {% for tag in post.tags %}
            <span class="tag">{{ tag }}</span>
            {% endfor %}
        </div>
    </header>
    <div class="post-content">
        {{ post.content | safe }}
    </div>
    <footer class="post-footer">
        <a href="{{ url_for('main.index') }}" class="btn">&larr; 返回首页</a>
    </footer>
</article>
{% endblock %}
